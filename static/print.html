        }

        .math-unit-title {

        .math-unit-content {

        }

        .train-item {

        .thinking-improvement-content {

        .thinking-improvement-content h1 {

        .thinking-improvement-content h2 {

            font-weight: bold;
        }

        .thinking-improvement-content h3 {

            font-weight: bold;
        }

        .thinking-improvement-content p {
            margin: 1mm 0;
        }

        .thinking-improvement-content ul,
        .thinking-improvement-content ol {
            margin: 1mm 0;
            padding-left: 4mm;
        }

        .thinking-improvement-content li {
            margin: 0.5mm 0;

        }

        .thinking-improvement-content strong {

        }

        .thinking-improvement-content code {
            padding: 0 1px;
            font-family: monospace;

        }

        .thinking-improvement-content blockquote {
            margin: 1mm 0;

        }

        .chemistry-processing {
            margin-top: 4mm;
            padding-top: 2mm;
            border-top: 1px solid #000;
        }

        .accumulation-section {
            margin-bottom: 4mm;
        }

        .accumulation-title {
            font-weight: bold;
            font-size: 11pt;
            margin-bottom: 2mm;
            color: #000;
        }

        .accumulation-item {
            margin: 2mm 0 3mm 0;
            padding-top: 2mm;
            border-top: 1px dashed #666;
        }

        .accumulation-item:first-child {
            border-top: none;
            padding-top: 0;
        }

        .accumulation-tags {
            margin-bottom: 1mm;
        }

        .accumulation-tag {
            display: inline-block;
            font-size: 9pt;
            padding: 1px 4px;
            margin-right: 2mm;
            border: 1px solid #333;
            color: #000;
        }

        .accumulation-content {
            font-size: 11pt;
            margin: 1mm 0;
            line-height: 1.5;
            color: #000;
        }

        .accumulation-answer {
            font-size: 10pt;
            margin-top: 1mm;
            color: #000;
            line-height: 1.5;
        }

        .accumulation-answer strong {
            color: #000;
        }

        .difficulty-teaching-wrapper {
            margin-top: 3mm;
            padding-top: 2mm;
            border-top: 1px solid #000;
        }

        .difficulty-teaching-columns {
            column-count: 2;
            column-gap: 6mm;
        }

        .difficulty-teaching-item {
            margin-bottom: 3mm;
        }

        .difficulty-teaching-title {
            font-weight: bold;
            font-size: 11pt;
            margin-bottom: 2mm;
            color: #000;
            border-bottom: 1px solid #000;
            padding-bottom: 1mm;
        }

        .difficulty-teaching-content {
            font-size: 10pt;
            line-height: 1.5;
            color: #000;
        }

        .difficulty-teaching-content h1 {
            font-size: 12pt;
            margin: 2mm 0 1mm;
            font-weight: bold;
            color: #000;
        }

        .difficulty-teaching-content h2 {
            font-size: 11.5pt;
            margin: 1.5mm 0 1mm;
            font-weight: bold;
            color: #000;
        }

        .difficulty-teaching-content h3 {
            font-size: 11pt;
            margin: 1mm 0 0.5mm;
            font-weight: bold;
            color: #000;
        }

        .difficulty-teaching-content h4 {
            font-size: 11pt;
            margin: 1mm 0 0.5mm;
            font-weight: bold;
            color: #000;
        }

        .difficulty-teaching-content p {
            margin: 1mm 0;
        }

        .difficulty-teaching-content ul,
        .difficulty-teaching-content ol {
            margin: 1mm 0;
            padding-left: 4mm;
        }

        .difficulty-teaching-content li {
            margin: 0.5mm 0;
            font-size: 10pt;
        }

        .difficulty-teaching-content strong {
            font-weight: bold;
            color: #000;
        }

        .difficulty-teaching-content em {
            font-style: italic;
            color: #000;
        }

        .difficulty-teaching-content code {
            padding: 0 2px;
            font-family: monospace;
            font-size: 10pt;
        }

        .difficulty-teaching-content pre {
            padding: 2mm;
            overflow-x: auto;
            font-size: 10pt;
            border: 1px solid #ccc;
        }

        .difficulty-teaching-content pre code {
            padding: 0;
        }

        .difficulty-teaching-content blockquote {
            border-left: 2px solid #000;
            margin: 1mm 0;
            padding-left: 3mm;
            color: #000;
        }

        .difficulty-teaching-content table {
            border-collapse: collapse;
            width: 100%;
            margin: 1mm 0;
        }

        .difficulty-teaching-content table,
        .difficulty-teaching-content th,
        .difficulty-teaching-content td {
            border: 1px solid #000;
            padding: 1mm 2mm;
        }

        .difficulty-teaching-content hr {
            border: none;
            border-top: 1px solid #000;
            margin: 2mm 0;
        }
    </style>
</head>
<body>
    <div class="controls">
        <h2>错题打印</h2>
        <div class="control-row">
            <div class="control-group">
                <label>布局模式:</label>
                <select id="layoutMode" onchange="renderPreview()">
                    <option value="single">单栏</option>
                    <option value="double">双栏</option>
                    <option value="auto">自动（推荐）</option>
                </select>
            </div>
            <div class="control-group">
                <label>每页题目数:</label>
                <select id="questionsPerPage" onchange="renderPreview()">
                    <option value="auto">自动</option>
                    <option value="2">2题</option>
                    <option value="3">3题</option>
                    <option value="4">4题</option>
                    <option value="6">6题</option>
                </select>
            </div>
            <div class="control-group">
                <label>
                    <input type="checkbox" id="showAnnotation" onchange="toggleAnnotation()">
                    显示批注区
                </label>
            </div>
            <div class="control-group">
                <label>
                    <input type="checkbox" id="compactMode" onchange="toggleCompact()">
                    紧凑模式
                </label>
            </div>
        </div>
        <div class="search-row">
            <input type="text" id="searchInput" placeholder="支持 Anki 搜索语法，如: (tag:生物 OR tag:化学) tag:重要 -tag:已掌握" oninput="applySearchFilter()">
            <button class="btn btn-secondary" onclick="clearSearch()">清除</button>
        </div>
        <div class="tag-filter" id="tagFilter">
            <span class="tag-filter-label">标签筛选:</span>
            <span style="color: #999;">加载中...</span>
        </div>
        <div class="file-list-wrapper" id="fileListWrapper">
            <div class="file-list-header" onclick="toggleFileList()">
                <span class="file-list-title">已选题目 (<span id="selectedCount">0</span>)</span>
                <span class="file-list-toggle" id="fileListToggle">▼ 点击折叠</span>
            </div>
            <div class="file-list" id="fileList">
                <span style="color: #999;">加载中...</span>
            </div>
        </div>
        <div class="btn-group">
            <button class="btn btn-primary" onclick="generatePreview()">生成预览</button>
            <button class="btn btn-secondary" onclick="printSelected()">打印</button>
            <button class="btn btn-secondary" onclick="selectAll()">全选</button>
            <button class="btn btn-secondary" onclick="deselectAll()">取消全选</button>
            <button class="btn btn-secondary" onclick="invertSelection()">反向选择</button>
        </div>
    </div>

    <div class="print-container" id="printContainer">
        <div class="a4-page">
            <div class="no-data">请选择题目后点击"生成预览"按钮</div>
        </div>
    </div>

    <script src="static/js/utils.js"></script>
    <script src="static/js/api.js"></script>
    <script src="static/js/image-handler.js"></script>
    <script src="static/js/content-renderer.js"></script>
    <script src="static/js/state.js"></script>
    <script src="static/js/print.js"></script>
</body>
</html>
