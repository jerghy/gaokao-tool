<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>训练题目浏览</title>
    <link rel="stylesheet" href="static/css/common.css">
    <style>
        .left-panel {
            width: 20%;
        }

        .middle-panel {
            width: 35%;
            height: 100%;
            background-color: #f9f9f9;
            border-right: 1px solid #ddd;
            display: flex;
            flex-direction: column;
        }

        .right-panel {
            width: 45%;
            height: 100%;
            background-color: #fff;
            display: flex;
            flex-direction: column;
        }

        .tag-tree-count {
            font-size: 12px;
            color: #888;
            margin-left: 6px;
        }

        .training-item {
            background-color: #fff;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            margin: 10px;
            padding: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .training-item:hover {
            border-color: #4a90d9;
            box-shadow: 0 2px 8px rgba(74, 144, 217, 0.15);
        }

        .training-item.selected {
            border-color: #4a90d9;
            background-color: #f0f7ff;
        }

        .training-item-header {
            display: flex;
            align-items: center;
            margin-bottom: 8px;
        }

        .training-checkbox {
            margin-right: 8px;
            cursor: pointer;
        }

        .training-item-id {
            font-size: 12px;
            color: #999;
            margin-right: 8px;
        }

        .training-ability-tag {
            display: inline-block;
            padding: 2px 8px;
            background-color: #e8f4fc;
            border: 1px solid #3498db;
            border-radius: 10px;
            font-size: 11px;
            color: #2980b9;
        }

        .training-item-preview {
            font-size: 14px;
            color: #333;
            margin-bottom: 8px;
            overflow: hidden;
            text-overflow: ellipsis;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }

        .preview-text {
            line-height: 1.6;
        }

        .preview-material {
            background-color: #f9f9f9;
            padding: 12px;
            border-radius: 6px;
            border-left: 3px solid #3498db;
            margin-bottom: 15px;
        }

        .preview-question {
            background-color: #fff3e0;
            padding: 12px;
            border-radius: 6px;
            border-left: 3px solid #ff9800;
            margin-bottom: 15px;
        }

        .preview-answer {
            background-color: #e8f5e9;
            padding: 12px;
            border-radius: 6px;
            border-left: 3px solid #4caf50;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="left-panel">
            <div class="panel-header">
                <span>能力点标签</span>
                <button class="nav-btn small" onclick="clearTagSelection()">清除</button>
            </div>
            <div class="panel-content">
                <div class="tag-tree" id="tagTree"></div>
            </div>
        </div>
        
        <div class="middle-panel">
            <div class="panel-header">
                <span>训练题目列表</span>
                <button class="nav-btn small green" onclick="toggleSelectAll()">全选/取消</button>
            </div>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="搜索训练题目..." oninput="debounceApplyFilters()">
            </div>
            <div class="selection-info" id="selectionInfo" style="display: none;">
                已选择 <span id="selectedCount">0</span> 道训练题，右键可批量打印
            </div>
            <div class="pagination-container" id="paginationContainer"></div>
            <div class="panel-content" id="trainingList"></div>
        </div>
        
        <div class="right-panel">
            <div class="panel-header">
                <button class="nav-btn" onclick="location.href='/'">返回录入</button>
                <span>训练题目详情</span>
                <div></div>
            </div>
            <div class="panel-content" id="trainingPreview">
                <div class="preview-placeholder">点击左侧训练题查看详情</div>
            </div>
        </div>
    </div>
    
    <div class="context-menu" id="contextMenu">
        <div class="context-menu-item" onclick="batchPrint()">打印选中题目</div>
        <div class="context-menu-item" onclick="selectAll()">全选</div>
        <div class="context-menu-item" onclick="deselectAll()">取消全选</div>
    </div>

    <script>
        const API_BASE = '';
        
        let tagTree = {};
        let allTags = [];
        let trainingItems = [];
        let selectedTags = new Set();
        let selectedItems = new Set();
        let expandedTags = new Set();
        let currentTraining = null;
        let debounceTimer = null;
        
        let currentPage = 1;
        let totalPages = 1;
        let totalItems = 0;
        let pageSize = 50;
        let currentSearch = '';
        let currentAbilityTag = '';
        let totalCount = 0;
        
        async function loadTags() {
            try {
                const response = await fetch(`${API_BASE}/api/training-ability-tags`);
                const result = await response.json();
                if (result.success) {
                    tagTree = result.tag_tree;
                    allTags = result.all_tags;
                    totalCount = result.total_count || 0;
                    renderTagTree();
                }
            } catch (error) {
                console.error('加载标签失败:', error);
            }
        }
        
        function renderTagTree() {
            const container = document.getElementById('tagTree');
            let html = '<div class="tag-tree-item">';
            html += '<div class="tag-tree-content' + (currentAbilityTag === '' ? ' selected' : '') + '" onclick="filterByTag(\'\')">';
            html += '<span class="tag-tree-toggle hidden"></span>';
            html += '<span class="tag-tree-label">全部</span>';
            html += '<span class="tag-tree-count">(' + totalCount + ')</span>';
            html += '</div></div>';
            html += renderTreeNode(tagTree, '');
            container.innerHTML = html;
        }
        
        function renderTreeNode(tree, prefix) {
            let html = '';
            for (const [tag, value] of Object.entries(tree)) {
                const fullTag = prefix ? `${prefix}::${tag}` : tag;
                const hasChildren = value && value.children && Object.keys(value.children).length > 0;
                const isExpanded = expandedTags.has(fullTag);
                const isSelected = currentAbilityTag === fullTag;
                const count = value.count || 0;
                
                if (count === 0) continue;
                
                html += `<div class="tag-tree-item">`;
                html += `<div class="tag-tree-content ${isSelected ? 'selected' : ''}" onclick="filterByTag('${escapeHtml(fullTag)}')">`;
                
                if (hasChildren) {
                    html += `<span class="tag-tree-toggle" onclick="event.stopPropagation(); toggleTagExpand('${escapeHtml(fullTag)}')">${isExpanded ? '▼' : '▶'}</span>`;
                } else {
                    html += `<span class="tag-tree-toggle hidden"></span>`;
                }
                
                html += `<span class="tag-tree-label">${escapeHtml(tag)}</span>`;
                html += `<span class="tag-tree-count">(${count})</span>`;
                html += `</div>`;
                
                if (hasChildren) {
                    html += `<div class="tag-tree-children ${isExpanded ? 'expanded' : ''}">`;
                    html += renderTreeNode(value.children, fullTag);
                    html += `</div>`;
                }
                
                html += `</div>`;
            }
            return html;
        }
        
        function toggleTagExpand(tag) {
            if (expandedTags.has(tag)) {
                expandedTags.delete(tag);
            } else {
                expandedTags.add(tag);
            }
            renderTagTree();
        }
        
        function filterByTag(tag) {
            currentAbilityTag = tag;
            currentPage = 1;
            renderTagTree();
            loadTrainingItems();
        }
        
        function clearTagSelection() {
            currentAbilityTag = '';
            currentPage = 1;
            renderTagTree();
            loadTrainingItems();
        }
        
        async function loadTrainingItems() {
            try {
                let url = `${API_BASE}/api/training-items?page=${currentPage}&page_size=${pageSize}`;
                if (currentSearch.trim()) {
                    url += `&search=${encodeURIComponent(currentSearch)}`;
                }
                if (currentAbilityTag) {
                    url += `&ability_tag=${encodeURIComponent(currentAbilityTag)}`;
                }
                
                const response = await fetch(url);
                const result = await response.json();
                trainingItems = result.items || [];
                totalItems = result.total || 0;
                totalPages = result.total_pages || 1;
                
                renderTrainingList();
                renderPagination();
            } catch (error) {
                console.error('加载训练题目失败:', error);
            }
        }
        
        function renderPagination() {
            const container = document.getElementById('paginationContainer');
            if (!container) return;
            
            let html = `<span class="pagination-info">共 ${totalItems} 题，第 ${currentPage}/${totalPages} 页</span>`;
            
            if (totalPages > 1) {
                html += '<div style="display:flex;gap:5px;">';
                html += `<button class="pagination-btn" onclick="goToPage(1)" ${currentPage === 1 ? 'disabled' : ''}>首页</button>`;
                html += `<button class="pagination-btn" onclick="goToPage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>上一页</button>`;
                
                const startPage = Math.max(1, currentPage - 2);
                const endPage = Math.min(totalPages, currentPage + 2);
                for (let i = startPage; i <= endPage; i++) {
                    html += `<button class="pagination-btn ${i === currentPage ? 'active' : ''}" onclick="goToPage(${i})">${i}</button>`;
                }
                
                html += `<button class="pagination-btn" onclick="goToPage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''}>下一页</button>`;
                html += `<button class="pagination-btn" onclick="goToPage(${totalPages})" ${currentPage === totalPages ? 'disabled' : ''}>末页</button>`;
                html += '</div>';
            }
            
            container.innerHTML = html;
        }
        
        async function goToPage(page) {
            if (page < 1 || page > totalPages) return;
            currentPage = page;
            await loadTrainingItems();
        }
        
        function debounceApplyFilters() {
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(() => {
                currentSearch = document.getElementById('searchInput').value;
                currentPage = 1;
                loadTrainingItems();
            }, 300);
        }
        
        function renderTrainingList() {
            const container = document.getElementById('trainingList');
            
            if (trainingItems.length === 0) {
                container.innerHTML = '<div class="preview-placeholder">没有找到训练题目</div>';
                return;
            }
            
            container.innerHTML = trainingItems.map(item => {
                const isSelected = selectedItems.has(item.id);
                const preview = item.question.length > 80 ? item.question.substring(0, 80) + '...' : item.question;
                
                return `
                    <div class="training-item ${isSelected ? 'selected' : ''}"
                         data-id="${item.id}"
                         onclick="selectTraining(event, '${item.id}')"
                         oncontextmenu="showContextMenu(event, '${item.id}')">
                        <div class="training-item-header">
                            <input type="checkbox" class="training-checkbox" ${isSelected ? 'checked' : ''} onclick="toggleItemSelection(event, '${item.id}')">
                            <span class="training-item-id">#${item.question_id}</span>
                            <span class="training-ability-tag">${escapeHtml(item.abilityPoint)}</span>
                        </div>
                        <div class="training-item-preview">${escapeHtml(preview)}</div>
                    </div>
                `;
            }).join('');
            
            updateSelectionInfo();
        }
        
        function toggleItemSelection(event, id) {
            event.stopPropagation();
            if (selectedItems.has(id)) {
                selectedItems.delete(id);
            } else {
                selectedItems.add(id);
            }
            renderTrainingList();
        }
        
        function selectTraining(event, id) {
            if (event.ctrlKey || event.metaKey) {
                if (selectedItems.has(id)) {
                    selectedItems.delete(id);
                } else {
                    selectedItems.add(id);
                }
            } else {
                selectedItems.clear();
                selectedItems.add(id);
            }
            
            renderTrainingList();
            loadTrainingDetail(id);
        }
        
        function loadTrainingDetail(id) {
            const item = trainingItems.find(t => t.id === id);
            if (!item) return;
            
            currentTraining = item;
            
            const container = document.getElementById('trainingPreview');
            container.innerHTML = `
                <div class="preview-content">
                    <div class="preview-section">
                        <div class="preview-section-title">能力点</div>
                        <div class="training-ability-tag" style="font-size: 14px;">${escapeHtml(item.abilityPoint)}</div>
                    </div>
                    <div class="preview-section">
                        <div class="preview-section-title">材料</div>
                        <div class="preview-material preview-text">${escapeHtml(item.material)}</div>
                    </div>
                    <div class="preview-section">
                        <div class="preview-section-title">问题</div>
                        <div class="preview-question preview-text">${escapeHtml(item.question)}</div>
                    </div>
                    <div class="preview-section">
                        <div class="preview-section-title">答案解析</div>
                        <div class="preview-answer preview-text">${escapeHtml(item.answerAnalysis)}</div>
                    </div>
                </div>
            `;
        }
        
        function toggleSelectAll() {
            if (selectedItems.size === trainingItems.length) {
                selectedItems.clear();
            } else {
                trainingItems.forEach(item => selectedItems.add(item.id));
            }
            renderTrainingList();
        }
        
        function selectAll() {
            hideContextMenu();
            trainingItems.forEach(item => selectedItems.add(item.id));
            renderTrainingList();
        }
        
        function deselectAll() {
            hideContextMenu();
            selectedItems.clear();
            renderTrainingList();
        }
        
        function updateSelectionInfo() {
            const info = document.getElementById('selectionInfo');
            const count = document.getElementById('selectedCount');
            
            if (selectedItems.size > 0) {
                info.style.display = 'block';
                count.textContent = selectedItems.size;
            } else {
                info.style.display = 'none';
            }
        }
        
        function showContextMenu(event, id) {
            event.preventDefault();
            
            if (!selectedItems.has(id)) {
                selectedItems.clear();
                selectedItems.add(id);
                renderTrainingList();
            }
            
            const menu = document.getElementById('contextMenu');
            menu.style.left = event.pageX + 'px';
            menu.style.top = event.pageY + 'px';
            menu.classList.add('show');
        }
        
        function hideContextMenu() {
            document.getElementById('contextMenu').classList.remove('show');
        }
        
        function batchPrint() {
            hideContextMenu();
            if (selectedItems.size === 0) {
                alert('请先选择要打印的训练题');
                return;
            }
            
            const ids = Array.from(selectedItems).join(',');
            window.open(`/training-print?ids=${ids}`, '_blank');
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        document.addEventListener('click', (e) => {
            if (!e.target.closest('.context-menu')) {
                hideContextMenu();
            }
        });
        
        loadTags();
        loadTrainingItems();
    </script>
</body>
</html>
