<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>错题收录系统</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <link rel="stylesheet" href="static/css/common.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <style>
        .left-panel {
            width: 50%;
        }

        .right-panel {
            width: 50%;
            background-color: #e0e0e0;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 20px;
            overflow-y: auto;
        }

        .preview-content {
            font-size: 14px;
            line-height: 1.8;
        }

        .preview-image-center {
            display: block;
            margin: 10px auto;
        }

        .preview-image-float-left {
            float: left;
            margin: 5px 15px 10px 0;
        }

        .preview-image-float-right {
            float: right;
            margin: 5px 0 10px 15px;
        }

        .preview-content::after {
            content: "";
            display: table;
            clear: both;
        }

        .a4-preview {
            width: 210mm;
            min-height: 297mm;
            background-color: #fff;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
            padding: 20mm;
            transform-origin: top center;
        }

        .connection-section {
            padding: 10px 15px;
            border-top: 1px solid #e0e0e0;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
        }

        .connection-section label {
            font-size: 14px;
            color: #333;
            font-weight: bold;
        }

        .port-input {
            width: 80px;
            padding: 6px 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
            text-align: center;
        }

        .connect-btn {
            background-color: #27ae60;
            color: white;
            border: none;
            border-radius: 4px;
            padding: 6px 16px;
            cursor: pointer;
            font-size: 14px;
            transition: background-color 0.2s;
        }

        .connect-btn:hover {
            background-color: #219a52;
        }

        .connect-btn.disconnect {
            background-color: #e74c3c;
        }

        .connect-btn.disconnect:hover {
            background-color: #c0392b;
        }

        .connection-status {
            font-size: 12px;
            padding: 4px 10px;
            border-radius: 12px;
        }

        .connection-status.connected {
            background-color: #e8f8ef;
            color: #27ae60;
        }

        .connection-status.disconnected {
            background-color: #f5f5f5;
            color: #999;
        }

        @media screen and (max-width: 1200px) {
            .a4-preview {
                transform: scale(0.7);
            }
        }

        @media screen and (max-width: 900px) {
            .a4-preview {
                transform: scale(0.5);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="left-panel">
            <div class="tabs">
                <button class="tab active" data-tab="question">原题</button>
                <button class="tab" data-tab="answer">答案</button>
            </div>
            
            <div id="question-tab" class="tab-content active">
                <div class="input-area">
                    <button class="main-paste-btn" id="question-paste-btn" onclick="activateMainPaste('question')">
                        📋 点击此处粘贴原题内容
                    </button>
                    <div class="content-list" id="question-content-list">
                        <button class="add-text-btn" onclick="addTextItem()">+ 添加文本</button>
                    </div>
                </div>
            </div>

            <div id="answer-tab" class="tab-content">
                <div class="input-area">
                    <button class="main-paste-btn" id="answer-paste-btn" onclick="activateMainPaste('answer')">
                        📋 点击此处粘贴答案内容
                    </button>
                    <div class="content-list" id="answer-content-list">
                        <button class="add-text-btn" onclick="addTextItem()">+ 添加文本</button>
                    </div>
                </div>
            </div>
            
            <div class="tag-section">
                <label>标签：</label>
                <div class="tag-container" id="tag-container">
                    <input type="text" id="tag-input" placeholder="输入标签后按回车添加">
                </div>
                <div class="quick-tags">
                    <span class="quick-tag-label">快捷标签：</span>
                    <button class="quick-tag-btn" onclick="addTag('生物')">生物</button>
                    <button class="quick-tag-btn" onclick="addTag('化学')">化学</button>
                    <button class="quick-tag-btn" onclick="addTag('物理')">物理</button>
                    <button class="quick-tag-btn" onclick="addTag('数学')">数学</button>
                    <button class="quick-tag-btn" onclick="addTag('语文')">语文</button>
                    <!-- <button class="quick-tag-btn" onclick="addTag('英语')">英语</button> -->
                    <button class="quick-tag-btn" onclick="addTag('积累')">积累</button>
                    <button class="quick-tag-btn" onclick="addTag('思维')">思维</button>
                </div>
            </div>

            <div class="sub-questions-section" id="subQuestionsSection">
                <div class="sub-questions-header">
                    <label>小问（数据标记，不显示在预览中）</label>
                    <button class="add-sub-question-btn" onclick="addSubQuestion()">+ 增加小问</button>
                </div>
                <div id="subQuestionsList"></div>
            </div>

            <div class="connection-section">
                <label>截图监听：</label>
                <span class="connection-status connected" id="connection-status">监听中...</span>
            </div>

            <button class="save-btn" id="browse-btn" onclick="location.href='/browse'" style="background-color: #27ae60; margin-bottom: 0;">浏览错题</button>
            <button class="save-btn" id="save-btn">保存题目</button>
        </div>
        
        <div class="right-panel">
            <div class="a4-preview">
                <div class="preview-section">
                    <div class="preview-section-title">【原题】</div>
                    <div class="preview-content" id="question-preview"></div>
                </div>
                <div class="divider"></div>
                <div class="preview-section">
                    <div class="preview-section-title">【答案】</div>
                    <div class="preview-content" id="answer-preview"></div>
                </div>
            </div>
        </div>
    </div>
    
    <div id="charBoxModal" class="char-box-modal" style="display: none;">
        <div class="char-box-modal-content">
            <div class="char-box-modal-header">
                <span class="char-box-modal-title">标注字框</span>
                <button class="char-box-modal-close" onclick="closeCharBoxModal()">&times;</button>
            </div>
            <div class="char-box-mode-tabs">
                <button class="char-box-mode-tab active" data-mode="charbox" onclick="switchCharBoxMode('charbox')">字框标注</button>
                <button class="char-box-mode-tab" data-mode="splitline" onclick="switchCharBoxMode('splitline')">分割线</button>
            </div>
            <div class="char-box-image-container" id="charBoxImageContainer">
                <img src="" alt="图片" class="char-box-image" id="charBoxImage">
                <div class="char-box-overlay" id="charBoxOverlay"></div>
            </div>
            <div class="char-box-controls">
                <div class="char-box-font-size-group">
                    <label>字体大小:</label>
                    <select id="charBoxFontSize">
                        <option value="large">大 (12pt)</option>
                        <option value="medium" selected>中 (11pt)</option>
                        <option value="small">小 (10pt)</option>
                    </select>
                </div>
                <button class="char-box-btn char-box-btn-primary" onclick="confirmCharBox()">确认</button>
                <button class="char-box-btn char-box-btn-secondary" onclick="closeCharBoxModal()">取消</button>
            </div>
            <div class="char-box-hint" id="charBoxHint">在图片上拖动鼠标绘制一个正方形，代表一个汉字的大小</div>
        </div>
    </div>
    
    <script src="static/js/utils.js"></script>
    <script src="static/js/api.js"></script>
    <script src="static/js/image-handler.js"></script>
    <script src="static/js/content-renderer.js"></script>
    <script src="static/js/state.js"></script>
    <script src="static/js/index.js"></script>
</body>
</html>
