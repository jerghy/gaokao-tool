<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>英语学习段落卡片</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #f5f7fa;
            padding: 20px;
            font-family: "Times New Roman", "SimSun", serif;
        }
        .card-container {
            max-width: 820px;
            margin: 0 auto;
            padding: 24px;
            background: #ffffff;
            border: 1px solid #e4e7ed;
            border-radius: 8px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
            margin-bottom: 30px;
        }
        .section-header {
            color: #2385bb;
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 16px;
        }
        .article-header {
            color: #2385bb;
            font-size: 22px;
            font-weight: bold;
            text-align: center;
            padding: 15px 0;
            margin: 20px auto 10px;
            max-width: 820px;
            border-bottom: 2px solid #2385bb;
            border-top: 2px solid #2385bb;
        }
        .article-header:first-of-type {
            margin-top: 0;
        }
        .english-content {
            font-size: 16px;
            line-height: 1.8;
            color: #303133;
            margin-bottom: 22px;
        }
        .english-content sup {
            color: #2385bb;
            font-size: 12px;
            font-weight: 500;
        }
        .english-content .highlight-word {
            font-size: 1.15em;
            font-weight: bold;
        }
        .translation-title {
            color: #2385bb;
            font-size: 18px;
            font-weight: bold;
            margin: 24px 0 12px;
        }
        .chinese-content {
            font-size: 16px;
            line-height: 1.8;
            color: #303133;
            margin-bottom: 24px;
        }
        .vocab-title {
            color: #2385bb;
            font-size: 18px;
            font-weight: bold;
            margin: 24px 0 12px;
        }
        .vocab-container {
            display: flex;
            gap: 45px;
        }
        .vocab-column {
            flex: 1;
        }
        .vocab-item {
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 8px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
        }
        .vocab-num {
            color: #2385bb;
            font-weight: bold;
            margin-right: 6px;
        }
        .vocab-word {
            color: #2385bb;
            font-weight: bold;
            margin-right: 8px;
        }
        .vocab-phonetic {
            color: #606266;
            font-style: italic;
            margin-right: 8px;
        }
        .vocab-pos {
            color: #303133;
            font-weight: bold;
            margin-right: 4px;
        }
        .vocab-meaning {
            color: #303133;
        }
        .root-word {
            padding-left: 22px;
        }
        .root-word .vocab-num {
            color: #909399;
        }
        .root-word .vocab-word {
            color: #909399;
        }

        .print-btn-container {
            text-align: center;
            margin: 20px 0;
        }
        .print-btn {
            background: #2385bb;
            color: white;
            border: none;
            padding: 12px 40px;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.3s;
        }
        .print-btn:hover {
            background: #1a6a9a;
        }
        .print-tip {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 9999;
            justify-content: center;
            align-items: center;
        }
        .print-tip.show {
            display: flex;
        }
        .print-tip-box {
            background: white;
            padding: 30px 40px;
            border-radius: 10px;
            max-width: 450px;
            text-align: center;
        }
        .print-tip-box h3 {
            margin-bottom: 20px;
            color: #2385bb;
        }
        .print-tip-box p {
            margin-bottom: 15px;
            line-height: 1.8;
            color: #606266;
        }
        .print-tip-box .step {
            background: #f5f7fa;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
            text-align: left;
        }
        .print-tip-box .step strong {
            color: #2385bb;
        }
        .print-tip-btns {
            display: flex;
            gap: 15px;
            justify-content: center;
        }
        .print-tip-btns button {
            padding: 10px 30px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        }
        .btn-confirm {
            background: #2385bb;
            color: white;
            border: none;
        }
        .btn-cancel {
            background: white;
            color: #606266;
            border: 1px solid #dcdfe6;
        }
        .page-footer {
            display: none;
        }

        @page {
            size: A4;
            margin: 15mm;
        }
        @media print {
            html, body {
                width: 210mm;
            }
            body {
                background-color: white;
                padding: 0;
                font-size: 12pt;
            }
            .print-btn-container {
                display: none;
            }
            .card-container {
                box-shadow: none;
                border: none;
                border-bottom: 1px dashed #ccc;
                margin-bottom: 15px;
                padding: 12px 0;
            }
            .card-container:last-child {
                border-bottom: none;
            }
            .section-header {
                font-size: 13pt;
                margin-bottom: 8px;
            }
            .article-header {
                font-size: 15pt;
                padding: 10px 0;
                margin: 15px auto 10px;
                border-bottom: 1px solid #2385bb;
                border-top: 1px solid #2385bb;
            }
            .article-header:first-of-type {
                margin-top: 0;
            }
            .english-content {
                font-size: 12pt;
                line-height: 1.7;
                margin-bottom: 10px;
            }
            .english-content .highlight-word {
                font-size: 1.15em;
                font-weight: bold;
            }
            .translation-title,
            .vocab-title {
                font-size: 12pt;
                margin: 10px 0 6px;
            }
            .chinese-content {
                font-size: 12pt;
                line-height: 1.7;
                margin-bottom: 10px;
            }
            .vocab-item {
                font-size: 12pt;
                margin-bottom: 4px;
                line-height: 1.5;
            }
            .vocab-container {
                gap: 20px;
            }
            .root-word {
                padding-left: 18px;
            }
            p, div, span {
                orphans: 3;
                widows: 3;
            }
            .page-footer {
                display: block;
                position: fixed;
                bottom: 0;
                left: 0;
                right: 0;
                text-align: center;
                font-size: 9pt;
                color: #999;
                padding-bottom: 4mm;
            }
        }
    </style>
</head>
<body>
    <div class="print-tip" id="printTip">
        <div class="print-tip-box">
            <h3>🖨️ 打印提示</h3>
            <p>请在打印设置中<strong>关闭页眉页脚</strong>，以获得最佳打印效果：</p>
            <div class="step">
                <p><strong>步骤：</strong></p>
                <p>1. 点击下方"继续打印"按钮</p>
                <p>2. 在打印预览界面左侧找到 <strong>"页眉和页脚"</strong></p>
                <p>3. <strong>取消勾选</strong> 该选项</p>
            </div>
            <div class="print-tip-btns">
                <button class="btn-cancel" onclick="closePrintTip()">取消</button>
                <button class="btn-confirm" onclick="doPrint()">继续打印</button>
            </div>
        </div>
    </div>
    <div class="print-btn-container">
        <button class="print-btn" onclick="showPrintTip()">🖨️ 打印文档</button>
    </div>
    <div id="content"></div>
    <div class="page-footer" id="pageFooter"></div>

    <script>
        function showPrintTip() {
            document.getElementById('printTip').classList.add('show');
        }
        function closePrintTip() {
            document.getElementById('printTip').classList.remove('show');
        }
        function doPrint() {
            closePrintTip();
            window.print();
        }

        async function loadAllData() {
            const container = document.getElementById('content');
            container.innerHTML = '<div style="text-align:center;padding:50px;color:#909399;">加载中...</div>';
            
            try {
                const indexResponse = await fetch('result/');
                let jsonFiles = [];
                
                try {
                    const text = await indexResponse.text();
                    const matches = text.match(/\d+\.json/g);
                    if (matches) {
                        jsonFiles = [...new Set(matches)].sort((a, b) => {
                            return parseInt(a) - parseInt(b);
                        });
                    }
                } catch (e) {
                    jsonFiles = ['1.json', '2.json', '3.json'];
                }
                
                let allHtml = '';
                
                for (let i = 0; i < jsonFiles.length; i++) {
                    const fileName = jsonFiles[i];
                    try {
                        const response = await fetch('result/' + fileName);
                        if (!response.ok) continue;
                        const data = await response.json();
                        const articleNum = fileName.replace('.json', '');
                        allHtml += '<div class="article-header">第 ' + articleNum + ' 篇</div>';
                        allHtml += renderArticleContent(data);
                    } catch (e) {
                        console.error('加载 ' + fileName + ' 失败:', e);
                    }
                }
                
                container.innerHTML = allHtml || '<div class="card-container"><p style="color:red;">没有找到数据文件</p></div>';
            } catch (error) {
                container.innerHTML = '<div class="card-container"><p style="color:red;">加载数据失败: ' + error.message + '</p></div>';
            }
        }

        const CIRCLED_NUMS = ['①', '②', '③', '④', '⑤', '⑥', '⑦', '⑧', '⑨', '⑩', 
                              '⑪', '⑫', '⑬', '⑭', '⑮', '⑯', '⑰', '⑱', '⑲', '⑳',
                              '㉑', '㉒', '㉓', '㉔', '㉕', '㉖', '㉗', '㉘', '㉙', '㉚',
                              '㉛', '㉜', '㉝', '㉞', '㉟', '㊱', '㊲', '㊳', '㊴', '㊵',
                              '㊶', '㊷', '㊸', '㊹', '㊺', '㊻', '㊼', '㊽', '㊾', '㊿'];

        function getCircledNum(n) {
            if (n >= 1 && n <= 50) {
                return CIRCLED_NUMS[n - 1];
            }
            return '[' + n + ']';
        }

        function parseVocab(vocabText) {
            const groups = [];
            
            const mainNums = ['①', '②', '③', '④', '⑤', '⑥', '⑦', '⑧', '⑨', '⑩',
                              '⑪', '⑫', '⑬', '⑭', '⑮', '⑯', '⑰', '⑱', '⑲', '⑳',
                              '㉑', '㉒', '㉓', '㉔', '㉕', '㉖', '㉗', '㉘', '㉙', '㉚',
                              '㉛', '㉜', '㉝', '㉞', '㉟', '㊱', '㊲', '㊳', '㊴', '㊵',
                              '㊶', '㊷', '㊸', '㊹', '㊺', '㊻', '㊼', '㊽', '㊾', '㊿'];
            
            const positions = [];
            
            mainNums.forEach(num => {
                let idx = vocabText.indexOf(num);
                while (idx !== -1) {
                    positions.push({ idx, num, isMain: true });
                    idx = vocabText.indexOf(num, idx + 1);
                }
            });
            
            const bracketPattern = /\[(\d+)\]/g;
            let bracketMatch;
            while ((bracketMatch = bracketPattern.exec(vocabText)) !== null) {
                positions.push({ idx: bracketMatch.index, num: bracketMatch[0], isMain: true });
            }
            
            positions.sort((a, b) => a.idx - b.idx);
            
            for (let i = 0; i < positions.length; i++) {
                const start = positions[i].idx;
                const end = (i + 1 < positions.length) ? positions[i + 1].idx : vocabText.length;
                const segment = vocabText.substring(start, end).trim();
                
                if (segment) {
                    const group = [];
                    const rootParts = segment.split('Ⓡ').map(p => p.trim()).filter(p => p);
                    
                    rootParts.forEach((rp, idx) => {
                        if (idx === 0) {
                            group.push(rp);
                        } else {
                            group.push('Ⓡ ' + rp);
                        }
                    });
                    
                    if (group.length > 0) {
                        groups.push(group);
                    }
                }
            }

            return groups;
        }

        function parseVocabLine(line) {
            const isRoot = line.trim().startsWith('Ⓡ');
            let cleanLine = line.replace('Ⓡ', '').trim();
            
            let num = '';
            const circledMatch = cleanLine.match(/^([①②③④⑤⑥⑦⑧⑨⑩⑪⑫⑬⑭⑮⑯⑰⑱⑲⑳㉑㉒㉓㉔㉕㉖㉗㉘㉙㉚㉛㉜㉝㉞㉟㊱㊲㊳㊴㊵㊶㊷㊸㊹㊺㊻㊼㊽㊾㊿])/);
            const bracketMatch = cleanLine.match(/^\[(\d+)\]/);
            
            if (circledMatch) {
                num = circledMatch[1];
                cleanLine = cleanLine.substring(circledMatch[0].length).trim();
            } else if (bracketMatch) {
                num = bracketMatch[0];
                cleanLine = cleanLine.substring(bracketMatch[0].length).trim();
            }

            const wordMatch = cleanLine.match(/^([a-zA-Z\-]+(?:\s+[a-zA-Z]+)?)\s+/);
            let word = '';
            if (wordMatch) {
                word = wordMatch[1];
                cleanLine = cleanLine.substring(wordMatch[0].length).trim();
            }

            const phoneticMatch = cleanLine.match(/^(\/[^\/]+\/)\s*/);
            let phonetic = '';
            if (phoneticMatch) {
                phonetic = phoneticMatch[1];
                cleanLine = cleanLine.substring(phoneticMatch[0].length).trim();
            }

            const parts = [];
            const posPattern = /([a-z]+\.)\s*([^a-z.]+)/gi;
            let match;
            let lastIndex = 0;
            
            while ((match = posPattern.exec(cleanLine)) !== null) {
                parts.push({
                    pos: match[1],
                    meaning: match[2].trim()
                });
                lastIndex = match.index + match[0].length;
            }

            if (parts.length === 0 && cleanLine) {
                parts.push({ pos: '', meaning: cleanLine });
            }

            return { isRoot, num, word, phonetic, parts };
        }

        function renderVocabItem(item) {
            let html = '<div class="vocab-item' + (item.isRoot ? ' root-word' : '') + '">';
            html += '<span class="vocab-num">' + item.num + '</span>';
            html += '<span class="vocab-word">' + item.word + '</span>';
            html += '<span class="vocab-phonetic">' + item.phonetic + '</span>';
            
            item.parts.forEach(part => {
                if (part.pos) {
                    html += '<span class="vocab-pos">' + part.pos + '</span>';
                }
                if (part.meaning) {
                    html += '<span class="vocab-meaning">' + part.meaning + '</span>';
                }
            });
            
            html += '</div>';
            return html;
        }

        function renderArticleContent(data) {
            let html = '';

            data.forEach((item, index) => {
                html += '<div class="card-container">';
                html += '<div class="section-header">第' + (index + 1) + '段</div>';
                
                let englishContent = item.原文;
                for (let i = 1; i <= 80; i++) {
                    const num = getCircledNum(i);
                    if (i <= 50) {
                        const regex = new RegExp('([a-zA-Z\\-]+)' + num, 'g');
                        englishContent = englishContent.replace(regex, '<span class="highlight-word">$1</span><sup>' + num + '</sup>');
                    } else {
                        const regex = new RegExp('([a-zA-Z\\-]+)\\[' + i + '\\]', 'g');
                        englishContent = englishContent.replace(regex, '<span class="highlight-word">$1</span><sup>[' + i + ']</sup>');
                    }
                }
                html += '<div class="english-content">' + englishContent + '</div>';

                html += '<div class="translation-title">段落译文</div>';
                html += '<div class="chinese-content">' + item.翻译 + '</div>';

                html += '<div class="vocab-title">必背词汇</div>';
                
                const vocabGroups = parseVocab(item.必背词汇);
                const halfIndex = Math.ceil(vocabGroups.length / 2);
                const leftGroups = vocabGroups.slice(0, halfIndex);
                const rightGroups = vocabGroups.slice(halfIndex);

                html += '<div class="vocab-container">';
                
                html += '<div class="vocab-column">';
                leftGroups.forEach(group => {
                    group.forEach(line => {
                        const parsed = parseVocabLine(line);
                        html += renderVocabItem(parsed);
                    });
                });
                html += '</div>';

                html += '<div class="vocab-column">';
                rightGroups.forEach(group => {
                    group.forEach(line => {
                        const parsed = parseVocabLine(line);
                        html += renderVocabItem(parsed);
                    });
                });
                html += '</div>';

                html += '</div>';
                html += '</div>';
            });

            return html;
        }

        loadAllData();
    </script>
</body>
</html>
